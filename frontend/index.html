<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/iris.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>t1-cve-enricher</title>
    <script>
      // Bootstrap theme from localStorage before render to prevent flash.
      // Default is dark (matches existing UX).
      (function () {
        var theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="bg-white text-tenable-black dark:bg-tenable-black dark:text-white font-sans tracking-aeonik-match">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
