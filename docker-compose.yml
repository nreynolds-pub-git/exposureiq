# Single-container deployment. Backend serves both the API at /api/* and
# the built frontend at /*. One port, one URL, one command.
services:
  exposureiq:
    build:
      context: .
      dockerfile: Dockerfile
    image: exposureiq:latest
    container_name: exposureiq
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Pin CORS to the same origin the frontend is served from — since the
    # backend serves both UI and API, there's no real cross-origin.
    environment:
      - CORS_ORIGINS=http://localhost:8000
    volumes:
      # SQLite database lives outside the container so it survives rebuilds.
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
