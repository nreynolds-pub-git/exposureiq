services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: t1-cve-enricher-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Mount a corporate cert bundle here if needed:
      # - /path/to/corporate-ca-bundle.pem:/etc/ssl/certs/corporate-ca-bundle.pem:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: t1-cve-enricher-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
